<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ trip.name }}</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <header>
    <a href="index.html">
      <img class="cover" src="cover.jpg" alt="cover">
    </a>
    <div>
      <h1>🌍 {{ trip.name }}</h1>
      <p class="subtitle">{{ steps|length }} étapes</p>
    </div>
  </header>

{% block content %}
<h1>Galerie</h1>
<div class="gallery-grid">
  {% for s in steps %}
  {% for m in s.media %}
  <a href="steps/step_{{ s.step.id }}.html" class="gallery-item">
    {% if m.kind == "photo" %}
      <img src="thumbnails/{{ m.relative_path }}" alt="{{ s.step.display_name }}" loading="lazy">
    {% elif m.kind == "video" %}
      <video controls preload="metadata" playsinline>
        <source src="media/{{ m.relative_path }}">
      </video>
    {% endif %}
  </a>
  {% endfor %}
  {% endfor %}
</div>
{% endblock %}
</body>
</html>
