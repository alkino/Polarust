<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ trip.name }}</title>
  <link rel="stylesheet" href="../style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <header>
    {% if cover_url %}
    <img class="cover" src="{{ cover_url }}" alt="cover">
    {% endif %}
    <div>
      <h1>🌍 {{ trip.name }}</h1>
      <p class="subtitle">{{ steps|length }} étapes</p>
    </div>
  </header>

  <div id="map"></div>

  <div class="carousel-wrapper">
    <button class="carousel-btn prev" onclick="scrollCarousel(-1)">‹</button>
    <div class="carousel" id="carousel">
      {% for es in steps %}
      <a href="steps/step_{{ es.step.id }}.html"
         class="card"
	 data-step-id="{{ es.step.id }}"
         onmouseenter="openMarker({{ es.step.id }})"
         onmouseleave="closeMarker({{ es.step.id }})">
        <div class="card-img" style="background-image: url('{{ es.thumb }}')"></div>
        <div class="card-body">
          <div class="card-date">{{ es.date | format_date }}</div>
          <h2 class="card-title">{{ es.step.display_name | default("Étape sans titre") }}</h2>
          <p class="card-location">📍 {{ es.location }} {{ es.weather }}</p>
          <p class="card-count">🖼 {{ es.media|length }} media</p>
        </div>
      </a>
      {% endfor %}
    </div>
    <button class="carousel-btn next" onclick="scrollCarousel(1)">›</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const TRIP_DATA = {
        polyline: {{ polyline }},
        gps_len: {{ gps_len }},
        first_lat: {{ first_lat }},
        first_lon: {{ first_lon }},
        markers: {{ map_markers | tojson | safe }},
    };
  </script>
  <script src="../trip.js"></script>
</body>
</html>
