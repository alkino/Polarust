<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ trip.name }}</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
</head>
<body>
  <header>
    {% if cover_url %}
    <img class="cover" src="{{ cover_url }}" alt="cover">
    {% endif %}
    <div>
      <h1>🌍 {{ trip.name }}</h1>
      <p class="subtitle">{{ steps|length }} étapes</p>
    </div>
  </header>

  <div id="map"></div>

  <div class="carousel-wrapper">
    <button class="carousel-btn prev" onclick="scrollCarousel(-1)">‹</button>
    <div class="carousel" id="carousel">
      {% for es in steps %}
      <a href="steps/step_{{ es.step.id }}.html"
         class="card"
	 data-step-id="{{ es.step.id }}"
         onmouseenter="openMarker({{ es.step.id }})"
         onmouseleave="closeMarker({{ es.step.id }})">
        <div class="card-img" style="background-image: url('{{ es.thumb }}')"></div>
        <div class="card-body">
          <div class="card-date">{{ es.date }}</div>
          <h2 class="card-title">{{ es.step.display_name | default("Étape sans titre") }}</h2>
          <p class="card-location">📍 {{ es.location }}</p>
          <p class="card-count">🖼 {{ es.photos|length }} photo(s)</p>
        </div>
      </a>
      {% endfor %}
    </div>
    <button class="carousel-btn next" onclick="scrollCarousel(1)">›</button>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map');
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    const polyline = L.polyline({{ polyline }}, {color: '#e74c3c', weight: 2, opacity: 0.7, lineJoin: 'round'}).addTo(map);
    if ({{ gps_len }} > 0) {
      map.fitBounds(polyline.getBounds().pad(0.1));
    } else {
      map.setView([{{ first_lat }}, {{ first_lon }}], 6);
    }

    const markers = {};
    {% for m in map_markers %}
    markers[{{ m.id }}] = L.marker([{{ m.lat }}, {{ m.lon }}], {
      icon: L.divIcon({
        className: '',
        html: '<div class="map-marker"></div>',
        iconSize: [14, 14],
        iconAnchor: [7, 7],
        popupAnchor: [0, 0],
      })
      })
      .addTo(map)
      .bindPopup('<b>{{ m.title }}</b><br><a href="steps/step_{{ m.id }}.html"><img src="{{ m.thumb }}" width="120"><br>Voir l\'étape</a>');
    {% endfor %}

    Object.values(markers).forEach(marker => {
            let timeout;
            
            marker.on('mouseover', function () {
                    clearTimeout(timeout);
                    this.openPopup();
            });
            marker.on('mouseout', function() {
                    const popup = this.getPopup().getElement();
                    timeout = setTimeout(() => this.closePopup(), 200);

                    popup?.addEventListener('mouseenter', () => clearTimeout(timeout));
                    popup?.addEventListener('mouseleave', () => this.closePopup());
            });
    });

    function openMarker(id) {
      const m = markers[id];
      if (!m) return;
      map.panTo(m.getLatLng(), { animate: true, duration: 0.3 });
      m.openPopup();
    }
    function closeMarker(id) {
      const m = markers[id];
      if (m) m.closePopup();
    }
    function scrollCarousel(dir) {
      document.getElementById('carousel').scrollBy({ left: dir * 300, behavior: 'smooth' });
    }

    const observer = new IntersectionObserver((entries) => {
	    entries.forEach(entry => {
		    if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
			    const id = entry.target.dataset.stepId;
			    if (!id) return;
			    Object.values(markers).forEach(m => m.closePopup());
			    openMarker(parseInt(id));
		    }
	    });
    }, {
	    root: document.getElementById('carousel'),
	    threshold: 0.6
    });

    document.querySelectorAll('.card[data-step-id]').forEach(card => {
	    observer.observe(card);
});
  </script>
</body>
</html>
